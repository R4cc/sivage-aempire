name: Build

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: Build jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build imaging WASM
        working-directory: src/main/rust
        run: cargo build --target wasm32-unknown-unknown --release --lib

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Determine release version
        id: version
        shell: bash
        run: |
          BASE_VERSION="$(grep '^mod_version=' gradle.properties | cut -d= -f2)"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${MAJOR}.${MINOR}.$((PATCH + GITHUB_RUN_NUMBER - 1))"
          else
            VERSION="$BASE_VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=aempire-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build jar
        run: ./gradlew build "-Pmod_version=${{ steps.version.outputs.version }}"

      - name: Rename jar
        shell: bash
        run: |
          mkdir -p dist
          cp "build/libs/sivage-${{ steps.version.outputs.version }}.jar" "dist/sivage-aempire-${{ steps.version.outputs.version }}.jar"

      - name: Delete previous automated release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release list --limit 100 --json tagName --jq '.[].tagName | select(startswith("aempire-v"))' | while read -r TAG; do
            gh release delete "$TAG" --cleanup-tag --yes || true
          done

      - name: Create release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "dist/sivage-aempire-${{ steps.version.outputs.version }}.jar" \
            --title "sivage-aempire ${{ steps.version.outputs.version }}" \
            --notes "Automated build for commit ${{ github.sha }}"
